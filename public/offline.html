<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archer's Mind — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafaf9;
      color: #1c1917;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      background: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.875rem;
      color: #78716c;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    button {
      background: #92400e;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #78350f; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🏹</div>
    <h1>Ești offline</h1>
    <p>Verifică conexiunea la internet și încearcă din nou. Paginile vizitate recent sunt disponibile offline.</p>
    <button onclick="location.reload()">Reîncearcă</button>
  </div>
</body>
</html>
